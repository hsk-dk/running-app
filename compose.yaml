services:
  ollama:
    image: ollama/ollama
    container_name: running-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    container_name: running-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull"]
    command: ["${OLLAMA_MODEL:-llama3}"]
    environment:
      OLLAMA_HOST: http://ollama:11434

  backend:
    build:
      context: ./backend
    container_name: running-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      DATABASE_PATH: /data/running.db
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    volumes:
      - ./data/sqlite:/data
    ports:
      - "18000:8000"
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: running-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    depends_on:
      - backend

volumes:
  ollama_data:
